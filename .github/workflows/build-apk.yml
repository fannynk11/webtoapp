name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
      target_url:
        description: 'URL Website'
        required: true
      use_custom_splash:
        description: 'Pakai Splash'
        default: 'false'
      splash_bg_color:
        description: 'Warna BG'
        default: '#FFFFFF'
      splash_text_color:
        description: 'Warna Teks'
        default: '#6C63FF'
      splash_loading_text:
        description: 'Teks Loading'
        default: 'Memuat...'
      splash_progress_bar_color:
        description: 'Warna Progress Bar'
        default: '#6C63FF'
      splash_use_logo_bg:
        description: 'Pakai BG Logo'
        default: 'false'
      hide_bottom_nav:
        description: 'Sembunyi Nav'
        default: 'false'
      splash_image_type:
        description: 'Tipe Gambar'
        default: 'none'
      splash_image_data:
        description: 'Data Gambar (URL/Base64)'
        default: ''
      splash_bg_image_type:
        description: 'Tipe BG Image'
        default: 'color'
      splash_bg_image_data:
        description: 'Data BG Image'
        default: ''
      app_icon_data:
        description: 'Data Icon Aplikasi (Base64/URL)'
        default: ''
      job_id:
        description: 'ID Job untuk Webhook'
        required: true
      server_url:
        description: 'URL Server untuk Webhook'
        required: true
      webhook_secret:
        description: 'Secret untuk Webhook'
        required: true


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:


  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'


      - name: Install dependencies
        run: flutter pub get

      - name: Customize App & Icon
        run: |
          # Create assets directory
          mkdir -p assets
          
          # Handle App Icon if provided
          if [ -n "${{ github.event.inputs.app_icon_data }}" ]; then
            if [[ "${{ github.event.inputs.app_icon_data }}" == http* ]]; then
              curl -L "${{ github.event.inputs.app_icon_data }}" -o assets/app_icon.png
            else
              echo "${{ github.event.inputs.app_icon_data }}" | cut -d',' -f2 | base64 -d > assets/app_icon.png
            fi
            # Generate icons
            flutter pub run flutter_launcher_icons
          fi

          # Replace Placeholders in lib/main.dart
          sed -i "s|TARGET_URL_PLACEHOLDER|${{ github.event.inputs.target_url }}|g" lib/main.dart
          sed -i "s|APP_NAME_PLACEHOLDER|${{ github.event.inputs.app_name }}|g" lib/main.dart
          sed -i "s|USE_CUSTOM_SPLASH_PLACEHOLDER|${{ github.event.inputs.use_custom_splash }}|g" lib/main.dart
          sed -i "s|SPLASH_BG_COLOR_PLACEHOLDER|${{ github.event.inputs.splash_bg_color }}|g" lib/main.dart
          sed -i "s|SPLASH_TEXT_COLOR_PLACEHOLDER|${{ github.event.inputs.splash_text_color }}|g" lib/main.dart
          sed -i "s|SPLASH_LOADING_TEXT_PLACEHOLDER|${{ github.event.inputs.splash_loading_text }}|g" lib/main.dart
          sed -i "s|SPLASH_PROGRESS_BAR_COLOR_PLACEHOLDER|${{ github.event.inputs.splash_progress_bar_color }}|g" lib/main.dart
          sed -i "s|SPLASH_USE_LOGO_BG_PLACEHOLDER|${{ github.event.inputs.splash_use_logo_bg }}|g" lib/main.dart
          sed -i "s|HIDE_BOTTOM_NAV_PLACEHOLDER|${{ github.event.inputs.hide_bottom_nav }}|g" lib/main.dart
          sed -i "s|SPLASH_IMAGE_TYPE_PLACEHOLDER|${{ github.event.inputs.splash_image_type }}|g" lib/main.dart
          sed -i "s|SPLASH_BG_IMAGE_TYPE_PLACEHOLDER|${{ github.event.inputs.splash_bg_image_type }}|g" lib/main.dart
          sed -i "s|SPLASH_IMAGE_DATA_PLACEHOLDER|${{ github.event.inputs.splash_image_data }}|g" lib/main.dart
          sed -i "s|SPLASH_BG_IMAGE_DATA_PLACEHOLDER|${{ github.event.inputs.splash_bg_image_data }}|g" lib/main.dart
          
          # Replace App Name in AndroidManifest.xml
          sed -i "s|android:label=.*|android:label=\"${{ github.event.inputs.app_name }}\"|g" android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: flutter build apk --release

      - name: Create Release and Notify
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            # Buat release baru menggunakan tag unik berdasarkan job_id
            # Kita gunakan "v-" sebagai awalan tag agar standar GitHub
            TAG_NAME="v-${{ github.event.inputs.job_id }}"
            
            gh release create "$TAG_NAME" \
              --title "Build: ${{ github.event.inputs.app_name }}" \
              --notes "Otomatis dibuat oleh WebToAPK Generator. Klik link di bawah untuk download." \
              "build/app/outputs/flutter-apk/app-release.apk#${{ github.event.inputs.app_name }}.apk"
            
            # URL Download langsung dari GitHub Release
            APK_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/${{ github.event.inputs.app_name }}.apk"
            
            # Notify server (Success)
            curl -k -X POST "${{ github.event.inputs.server_url }}/api/webhook/github" \
              -H "Content-Type: application/json" \
              -d "{\"jobId\": \"${{ github.event.inputs.job_id }}\", \"status\": \"completed\", \"downloadUrl\": \"$APK_URL\", \"secret\": \"${{ github.event.inputs.webhook_secret }}\"}"
          else
            # Notify server (Failure)
            curl -k -X POST "${{ github.event.inputs.server_url }}/api/webhook/github" \
              -H "Content-Type: application/json" \
              -d "{\"jobId\": \"${{ github.event.inputs.job_id }}\", \"status\": \"failed\", \"error\": \"GitHub Build Failed\", \"secret\": \"${{ github.event.inputs.webhook_secret }}\"}"
          fi





