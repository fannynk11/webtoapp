name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
      target_url:
        description: 'URL Website'
        required: true
      package_name:
        description: 'Package Name / Application ID'
        default: 'com.webtoapk.app'
      use_custom_splash:
        description: 'Pakai Splash'
        default: 'false'
      splash_bg_color:
        description: 'Warna BG'
        default: '#FFFFFF'
      splash_text_color:
        description: 'Warna Teks'
        default: '#6C63FF'
      splash_loading_text:
        description: 'Teks Loading'
        default: 'Memuat...'
      splash_progress_bar_color:
        description: 'Warna Progress Bar'
        default: '#6C63FF'
      splash_use_logo_bg:
        description: 'Pakai BG Logo'
        default: 'false'
      splash_logo_bg_color:
        description: 'Warna BG Logo'
        default: '#FFFFFF'
      hide_bottom_nav:
        description: 'Sembunyi Nav'
        default: 'false'
      splash_image_type:
        description: 'Tipe Gambar'
        default: 'none'
      splash_image_data:
        description: 'Data Gambar (URL/Base64)'
        default: ''
      splash_bg_image_type:
        description: 'Tipe BG Image'
        default: 'color'
      splash_bg_image_data:
        description: 'Data BG Image'
        default: ''
      app_icon_type:
        description: 'Tipe Icon Aplikasi'
        default: 'none'
      app_icon_data:
        description: 'Data Icon Aplikasi (Base64/URL)'
        default: ''
      use_custom_offline:
        description: 'Pakai Custom Offline'
        default: 'false'
      offline_title:
        description: 'Judul Offline'
        default: 'Koneksi Terputus'
      offline_desc:
        description: 'Deskripsi Offline'
        default: 'Pastikan internet aktif.'
      offline_btn_text:
        description: 'Teks Tombol Offline'
        default: 'Coba Lagi'
      offline_color:
        description: 'Warna Tema Offline'
        default: '#F59E0B'
      offline_icon_type:
        description: 'Tipe Ikon Offline'
        default: 'default'
      offline_icon_data:
        description: 'Data Ikon Offline'
        default: ''
      job_id:
        description: 'ID Job untuk Webhook'
        required: true
      server_url:
        description: 'URL Server untuk Webhook'
        required: true
      webhook_secret:
        description: 'Secret untuk Webhook'
        required: true


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:


  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'


      - name: Install dependencies
        run: flutter pub get

      - name: Customize App & Icon
        run: |
          # Create assets directory
          mkdir -p assets
          
          # Create placeholder transparent PNGs to prevent build failure if assets are missing
          # (1x1 transparent PNG base64)
          EMPTY_PNG="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="
          echo "$EMPTY_PNG" | base64 -d > assets/app_icon.png
          echo "$EMPTY_PNG" | base64 -d > assets/splash_logo.png
          echo "$EMPTY_PNG" | base64 -d > assets/splash_bg.png
          echo "$EMPTY_PNG" | base64 -d > assets/offline_icon.png

          # Handle App Icon (Overwrite placeholder if provided)
          if [ -n "${{ github.event.inputs.app_icon_data }}" ]; then
            if [[ "${{ github.event.inputs.app_icon_data }}" == http* ]]; then
              curl -L "${{ github.event.inputs.app_icon_data }}" -o assets/app_icon.png
            else
              echo "${{ github.event.inputs.app_icon_data }}" | cut -d',' -f2 | base64 -d > assets/app_icon.png
            fi
            # Generate icons
            flutter pub run flutter_launcher_icons
          fi

          # Handle Splash Logo (Overwrite placeholder if provided)
          SPLASH_IMAGE_DATA="${{ github.event.inputs.splash_image_data }}"
          if [ "${{ github.event.inputs.splash_image_type }}" == "asset" ] && [ -n "$SPLASH_IMAGE_DATA" ]; then
            if [[ "$SPLASH_IMAGE_DATA" == http* ]]; then
              curl -L "$SPLASH_IMAGE_DATA" -o assets/splash_logo.png
            else
              echo "$SPLASH_IMAGE_DATA" | cut -d',' -f2 | base64 -d > assets/splash_logo.png
            fi
            SPLASH_IMAGE_DATA="assets/splash_logo.png"
          fi

          # Handle Splash Background (Overwrite placeholder if provided)
          SPLASH_BG_DATA="${{ github.event.inputs.splash_bg_image_data }}"
          if [ "${{ github.event.inputs.splash_bg_image_type }}" == "asset" ] && [ -n "$SPLASH_BG_DATA" ]; then
            if [[ "$SPLASH_BG_DATA" == http* ]]; then
              curl -L "$SPLASH_BG_DATA" -o assets/splash_bg.png
            else
              echo "$SPLASH_BG_DATA" | cut -d',' -f2 | base64 -d > assets/splash_bg.png
            fi
            SPLASH_BG_DATA="assets/splash_bg.png"
          fi

          # Handle Offline Icon (Overwrite placeholder if provided)
          OFFLINE_ICON_DATA="${{ github.event.inputs.offline_icon_data }}"
          if [ "${{ github.event.inputs.offline_icon_type }}" == "asset" ] && [ -n "$OFFLINE_ICON_DATA" ]; then
            if [[ "$OFFLINE_ICON_DATA" == http* ]]; then
              curl -L "$OFFLINE_ICON_DATA" -o assets/offline_icon.png
            else
              echo "$OFFLINE_ICON_DATA" | cut -d',' -f2 | base64 -d > assets/offline_icon.png
            fi
            OFFLINE_ICON_DATA="assets/offline_icon.png"
          fi

          # Replace Placeholders in lib/main.dart
          sed -i "s|TARGET_URL_PLACEHOLDER|${{ github.event.inputs.target_url }}|g" lib/main.dart
          sed -i "s|APP_NAME_PLACEHOLDER|${{ github.event.inputs.app_name }}|g" lib/main.dart
          sed -i "s|USE_CUSTOM_SPLASH_PLACEHOLDER|${{ github.event.inputs.use_custom_splash }}|g" lib/main.dart
          sed -i "s|SPLASH_BG_COLOR_PLACEHOLDER|${{ github.event.inputs.splash_bg_color }}|g" lib/main.dart
          sed -i "s|SPLASH_TEXT_COLOR_PLACEHOLDER|${{ github.event.inputs.splash_text_color }}|g" lib/main.dart
          sed -i "s|SPLASH_LOADING_TEXT_PLACEHOLDER|${{ github.event.inputs.splash_loading_text }}|g" lib/main.dart
          sed -i "s|SPLASH_PROGRESS_BAR_COLOR_PLACEHOLDER|${{ github.event.inputs.splash_progress_bar_color }}|g" lib/main.dart
          sed -i "s|SPLASH_USE_LOGO_BG_PLACEHOLDER|${{ github.event.inputs.splash_use_logo_bg }}|g" lib/main.dart
          sed -i "s|SPLASH_LOGO_BG_COLOR_PLACEHOLDER|${{ github.event.inputs.splash_logo_bg_color }}|g" lib/main.dart
          sed -i "s|HIDE_BOTTOM_NAV_PLACEHOLDER|${{ github.event.inputs.hide_bottom_nav }}|g" lib/main.dart
          sed -i "s|SPLASH_IMAGE_TYPE_PLACEHOLDER|${{ github.event.inputs.splash_image_type }}|g" lib/main.dart
          sed -i "s|SPLASH_BG_IMAGE_TYPE_PLACEHOLDER|${{ github.event.inputs.splash_bg_image_type }}|g" lib/main.dart
          sed -i "s|SPLASH_IMAGE_DATA_PLACEHOLDER|$SPLASH_IMAGE_DATA|g" lib/main.dart
          sed -i "s|SPLASH_BG_IMAGE_DATA_PLACEHOLDER|$SPLASH_BG_DATA|g" lib/main.dart
          
          # Offline Screen Placeholders
          OFFLINE_TITLE=$(echo "${{ github.event.inputs.offline_title }}" | sed 's/"/\\"/g')
          OFFLINE_DESC=$(echo "${{ github.event.inputs.offline_desc }}" | sed 's/"/\\"/g')
          
          sed -i "s|USE_CUSTOM_OFFLINE_PLACEHOLDER|${{ github.event.inputs.use_custom_offline }}|g" lib/main.dart
          sed -i "s|OFFLINE_TITLE_PLACEHOLDER|$OFFLINE_TITLE|g" lib/main.dart
          sed -i "s|OFFLINE_DESC_PLACEHOLDER|$OFFLINE_DESC|g" lib/main.dart
          sed -i "s|OFFLINE_BTN_TEXT_PLACEHOLDER|${{ github.event.inputs.offline_btn_text }}|g" lib/main.dart
          sed -i "s|OFFLINE_COLOR_PLACEHOLDER|${{ github.event.inputs.offline_color }}|g" lib/main.dart
          sed -i "s|OFFLINE_ICON_TYPE_PLACEHOLDER|${{ github.event.inputs.offline_icon_type }}|g" lib/main.dart
          sed -i "s|OFFLINE_ICON_DATA_PLACEHOLDER|$OFFLINE_ICON_DATA|g" lib/main.dart
          
          # Replace App Name in AndroidManifest.xml
          sed -i "s|android:label=.*|android:label=\"${{ github.event.inputs.app_name }}\"|g" android/app/src/main/AndroidManifest.xml
          
          # Replace Application ID in build.gradle.kts
          sed -i "s|applicationId = .*|applicationId = \"${{ github.event.inputs.package_name }}\"|g" android/app/build.gradle.kts
          sed -i "s|namespace = .*|namespace = \"${{ github.event.inputs.package_name }}\"|g" android/app/build.gradle.kts

      - name: Build APK
        run: flutter build apk --release

      - name: Create Release and Notify
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            # Buat release baru menggunakan tag unik berdasarkan job_id
            # Kita gunakan "v-" sebagai awalan tag agar standar GitHub
            TAG_NAME="v-${{ github.event.inputs.job_id }}"
            
            gh release create "$TAG_NAME" \
              --title "Build: ${{ github.event.inputs.app_name }}" \
              --notes "Otomatis dibuat oleh WebToAPK Generator. Silakan download file APK di bawah ini." \
              "build/app/outputs/flutter-apk/app-release.apk#app-release.apk"
            
            # URL Download (Menggunakan nama file tetap 'app-release.apk' agar link selalu valid)
            APK_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/app-release.apk"

            
            # Notify server (Success)
            curl -k -X POST "${{ github.event.inputs.server_url }}/api/webhook/github" \
              -H "Content-Type: application/json" \
              -d "{\"jobId\": \"${{ github.event.inputs.job_id }}\", \"status\": \"completed\", \"downloadUrl\": \"$APK_URL\", \"secret\": \"${{ github.event.inputs.webhook_secret }}\"}"
          else
            # Notify server (Failure)
            curl -k -X POST "${{ github.event.inputs.server_url }}/api/webhook/github" \
              -H "Content-Type: application/json" \
              -d "{\"jobId\": \"${{ github.event.inputs.job_id }}\", \"status\": \"failed\", \"error\": \"GitHub Build Failed\", \"secret\": \"${{ github.event.inputs.webhook_secret }}\"}"
          fi





